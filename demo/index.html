<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonglade.Editor Demo</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../dist/moonglade-editor.css">
  <style>
    body {
      color: #212529;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }

    main {
      margin: 2rem auto;
      max-width: 960px;
      padding: 0 1rem;
    }

    textarea {
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      min-height: 10rem;
      width: 100%;
    }
  </style>
</head>
<body>
  <main>
    <h1>Moonglade.Editor Demo</h1>
    <div id="editor"></div>
    <h2>Synced HTML</h2>
    <textarea id="content"><h2>Hello from Moonglade.Editor</h2><p><strong>Bold</strong>, <em>italic</em>, and regular post content.</p><blockquote><p>A focused editor for blog posts.</p></blockquote></textarea>
  </main>

  <script src="../dist/moonglade-editor.global.js"></script>
  <script>
    const textarea = document.querySelector('#content');

    MoongladeEditor.createMoongladeEditor({
      element: document.querySelector('#editor'),
      textarea,
      uploadUrl: '/image'
    });
  </script>
</body>
</html>
