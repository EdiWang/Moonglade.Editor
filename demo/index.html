<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonglade.Editor Demo</title>
  <link rel="icon" href="data:,">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../dist/moonglade-editor.css">
</head>
<body class="bg-body-tertiary">
  <main class="container py-4">
    <h1 class="h3 mb-3">Moonglade.Editor Demo</h1>
    <div id="editor" class="mb-4"></div>

    <div class="mb-3">
      <label for="content" class="form-label h5">Synced HTML</label>
      <textarea id="content" class="form-control font-monospace" rows="8"><h2>Hello from Moonglade.Editor</h2><p><strong>Bold</strong>, <em>italic</em>, and regular post content.</p><blockquote><p>A focused editor for blog posts.</p></blockquote></textarea>
    </div>
  </main>

  <script src="../dist/moonglade-editor.global.js"></script>
  <script>
    const textarea = document.querySelector('#content');

    MoongladeEditor.createMoongladeEditor({
      element: document.querySelector('#editor'),
      textarea,
      uploadUrl: '/image'
    });
  </script>
</body>
</html>
